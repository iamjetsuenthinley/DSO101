services:
  - type: web
    name: be-todo
    env: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DB_HOST
        value: your_render_db_host
      - key: DB_USER
        value: your_render_db_user
      - key: DB_PASSWORD
        value: your_render_db_password
      - key: DB_NAME
        value: your_render_db_name
      - key: PORT
        value: 5000

  - type: web
    name: fe-todo
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: VITE_API_URL
        value: https://be-todo.onrender.com